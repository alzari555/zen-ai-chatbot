<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zen AI</title>
  <link rel="stylesheet" href="sidebar.css">
</head>

<body>
  <div class="sidebar-container">
    <!-- Header (compact, right-aligned icons) -->
    <div class="header">
      <button class="icon-btn" id="clearBtn" title="New Chat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
        </svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M12 1v6m0 6v6m8.66-13l-5.2 3m-7 4l-5.2 3M22.66 17l-5.2-3m-7-4l-5.2-3" />
        </svg>
      </button>
    </div>

    <!-- Selection banner -->
    <div class="selection-banner hidden" id="selectionBanner">
      <div class="selection-icon">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M17 10H3M21 6H3M21 14H3M17 18H3" />
        </svg>
      </div>
      <span class="selection-text" id="selectionText"></span>
      <button class="selection-dismiss" id="selectionDismiss">&times;</button>
    </div>

    <!-- Messages area -->
    <div class="messages" id="messagesArea">
      <div class="welcome-message">
        <div class="welcome-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />
          </svg>
        </div>
        <h2>Zen AI</h2>
        <p>Ask questions about the current page, summarize content, or get explanations for highlighted text.</p>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="quick-actions" id="quickActions">
      <button class="action-btn" data-action="summarize">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
        </svg>
        Summarize
      </button>
      <button class="action-btn" data-action="explain">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
        Explain
      </button>
      <button class="action-btn" data-action="keypoints">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
        Key Points
      </button>
    </div>

    <!-- Context indicator (above input) -->
    <div class="context-bar" id="contextBar">
      <div class="context-icon">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>
      </div>
      <span class="context-text" id="contextText">No page loaded</span>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="chatInput" placeholder="Ask another question..." rows="1" autocomplete="off"></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal-overlay hidden" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Settings</h3>
        <button class="icon-btn modal-close" id="settingsClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="apiKeyInput">Gemini API Key</label>
          <p class="setting-hint">Get your key from <a href="https://aistudio.google.com/apikey" target="_blank">Google
              AI Studio</a></p>
          <div class="api-key-input-wrapper">
            <input type="password" id="apiKeyInput" placeholder="Enter your Gemini API key..." autocomplete="off" />
            <button class="icon-btn toggle-visibility" id="toggleKeyVisibility" title="Show/hide key">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <div class="setting-group">
          <label for="deepseekApiKeyInput">Deepseek API Key</label>
          <p class="setting-hint">Get your key from <a href="https://platform.deepseek.com/api_keys"
              target="_blank">Deepseek Platform</a></p>
          <div class="api-key-input-wrapper">
            <input type="password" id="deepseekApiKeyInput" placeholder="Enter your Deepseek API key..."
              autocomplete="off" />
            <button class="icon-btn toggle-visibility" id="toggleDeepseekKeyVisibility" title="Show/hide key">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <div class="setting-group">
          <label for="openRouterApiKeyInput">OpenRouter API Key</label>
          <p class="setting-hint">Get your key from <a href="https://openrouter.ai/keys" target="_blank">OpenRouter</a>
          </p>
          <div class="api-key-input-wrapper">
            <input type="password" id="openRouterApiKeyInput" placeholder="Enter your OpenRouter API key..."
              autocomplete="off" />
            <button class="icon-btn toggle-visibility" id="toggleOpenRouterKeyVisibility" title="Show/hide key">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <div class="setting-group">
          <label for="modelSelect">Model</label>
          <select id="modelSelect">
            <optgroup label="OpenRouter" id="openRouterGroup">
              <option value="openrouter:openrouter/free">Auto (Free Models)</option>
              <option value="openrouter:openrouter/auto">Auto (Best Model)</option>
              <option value="openrouter:anthropic/claude-3.7-sonnet">Claude 3.7 Sonnet</option>
              <option value="openrouter:anthropic/claude-3.5-haiku">Claude 3.5 Haiku</option>
              <option value="openrouter:openai/gpt-4o">GPT-4o</option>
              <option value="openrouter:meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B</option>
            </optgroup>
            <optgroup label="Deepseek">
              <option value="deepseek-chat">Deepseek Chat</option>
              <option value="deepseek-reasoner">Deepseek Reasoner</option>
            </optgroup>
            <optgroup label="Gemini (Auto-Update)">
              <option value="gemini-2.5-pro">Gemini Pro (Always latest)</option>
              <option value="gemini-2.5-flash">Gemini Flash (Always latest)</option>
              <option value="gemini-2.5-flash-lite">Gemini Flash Lite (Always latest)</option>
            </optgroup>
          </select>
        </div>
        <div class="setting-group">
          <label>Theme</label>
          <div class="theme-toggle-group">
            <button class="theme-option" data-theme-value="system">System</button>
            <button class="theme-option" data-theme-value="light">Light</button>
            <button class="theme-option" data-theme-value="dark">Dark</button>
          </div>
        </div>
        <button class="save-btn" id="saveSettings">Save Settings</button>
        <div class="save-status hidden" id="saveStatus">✓ Settings saved</div>
      </div>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>

</html>
